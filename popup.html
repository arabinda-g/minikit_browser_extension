<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiniKit</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="header">
        <p class="eyebrow">MiniKit</p>
        <h1>Quick Actions</h1>
      </div>
      <p class="subtitle">Copy links from all tabs in this window with one click.</p>
      <button id="copyAllLinksButton" class="primary-button" type="button">Copy All Links</button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
